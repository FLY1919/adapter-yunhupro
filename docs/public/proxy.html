<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>proxy</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #222;
    }

    #message {
      padding: 16px 20px;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      text-align: center;
    }

    #preview {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div id="message">正在加载图片...</div>
  <img id="preview" alt="media">

  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const mediaUrl = params.get('url') || '';
      const mediaType = (params.get('type') || 'image').toLowerCase();
      const message = document.getElementById('message');
      const preview = document.getElementById('preview');
      const apifoxProxy = 'https://web-proxy.apifox.com/api/v1/request';
      const referer = 'http://myapp.jwznb.com';
      const userAgent = 'Apifox/1.0.0 (https://apifox.com)';

      if (!mediaUrl) {
        message.textContent = '缺少 url 参数。';
        return;
      }

      async function fetchViaApifox(targetUrl) {
        const host = new URL(targetUrl).host;
        const response = await fetch(apifoxProxy, {
          method: 'POST',
          headers: {
            'api-u': targetUrl,
            'api-o0': 'method=GET, timings=true, timeout=300000, rejectUnauthorized=false, followRedirect=true',
            'api-h0': `Referer=${referer}, User-Agent=${userAgent}, Accept=*/*, Host=${host}, Accept-Encoding=gzip%2C deflate%2C br, Connection=keep-alive`,
          },
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response;
      }

      (async () => {
        try {
          const response = await fetchViaApifox(mediaUrl);
          const blob = await response.blob();
          if (!blob.size) {
            throw new Error('empty response');
          }
          const objectUrl = URL.createObjectURL(blob);
          message.remove();

          if (mediaType === 'image' || blob.type.startsWith('image/')) {
            preview.src = objectUrl;
            preview.style.display = 'block';
          } else {
            location.href = objectUrl;
          }
        } catch (error) {
          message.textContent = `加载失败：${String(error?.message || error)}`;
        }
      })();
    })();
  </script>
</body>
</html>
